<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sadaqa Impact - Mes Collectes</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card-gradient { background: linear-gradient(135deg, #f0fdf4 0%, #ffffff 100%); }
        .animate-fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        @media (max-width: 640px) { .input-responsive { font-size: 16px !important; } }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans text-gray-900 overflow-x-hidden">

    <section id="vue-login" class="min-h-screen flex items-center justify-center p-4">
        <div class="max-w-md w-full bg-white rounded-[2.5rem] shadow-xl p-8 sm:p-10 animate-fade-in border border-emerald-50 text-center">
            <div class="text-4xl mb-4">🌙</div>
            <h1 class="text-2xl sm:text-3xl font-extrabold text-emerald-800 mb-2">Sadaqa Impact</h1>
            <p class="text-gray-500 mb-8 font-medium">Gérez vos collectes de dons</p>
            <div class="space-y-4 text-left">
                <div id="register-fields" class="hidden grid grid-cols-2 gap-3">
                    <input type="text" id="reg-prenom" placeholder="Prénom" class="input-responsive w-full p-4 border border-gray-200 rounded-2xl outline-none focus:ring-2 focus:ring-emerald-500">
                    <input type="text" id="reg-nom" placeholder="Nom" class="input-responsive w-full p-4 border border-gray-200 rounded-2xl outline-none focus:ring-2 focus:ring-emerald-500">
                </div>
                <div id="standard-auth-fields" class="space-y-4">
                    <input type="email" id="login-email" placeholder="Email" class="input-responsive w-full p-4 border border-gray-200 rounded-2xl outline-none focus:ring-2 focus:ring-emerald-500">
                    <div class="space-y-2">
                        <div class="relative">
                            <input type="password" id="login-password" placeholder="Mot de passe" class="input-responsive w-full p-4 border border-gray-200 rounded-2xl outline-none focus:ring-2 focus:ring-emerald-500 pr-12">
                            <button onclick="togglePasswordVisibility()" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-emerald-600 transition-colors">
                                <span id="pwd-icon">👁️</span>
                            </button>
                        </div>
                        <div class="flex justify-end px-1">
                            <button onclick="handleForgotPassword()" class="text-sm font-bold text-emerald-600 hover:text-emerald-700">Mot de passe oublié ?</button>
                        </div>
                    </div>
                </div>
                <div class="flex flex-col gap-3 mt-6">
                    <button onclick="authAction()" id="btn-main-auth" class="w-full py-4 bg-emerald-600 text-white rounded-2xl font-bold shadow-lg">Se connecter</button>
                    <button onclick="toggleAuthMode()" id="btn-switch-auth" class="w-full py-4 bg-white border-2 border-emerald-600 text-emerald-600 rounded-2xl font-bold">Créer un compte</button>
                </div>
            </div>
        </div>
    </section>

    <div id="app-dashboard" class="hidden">
        <nav class="bg-white border-b p-4 mb-6 sticky top-0 z-50">
            <div class="max-w-5xl mx-auto flex justify-between items-center px-2">
                <h1 class="text-lg font-bold text-emerald-700">🌙 Sadaqa Impact</h1>
                <button onclick="handleLogout()" class="text-xs font-bold text-red-500 bg-red-50 px-3 py-2 rounded-xl">Déconnexion</button>
            </div>
        </nav>
        <main class="max-w-5xl mx-auto px-4 pb-10">
            <div class="flex flex-col sm:flex-row sm:justify-between sm:items-center gap-4 mb-8">
                <div>
                    <h2 class="text-2xl sm:text-3xl font-black text-gray-800 tracking-tight">Mes Listes</h2>
                    <p id="user-welcome" class="text-gray-500 text-xs font-medium"></p>
                </div>
                <button onclick="ouvrirEditeur()" class="bg-emerald-600 text-white px-6 py-4 rounded-2xl font-bold shadow-lg">+ Nouvelle liste</button>
            </div>
            <div id="container-listes" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </main>
    </div>

    <div id="app-editor" class="hidden min-h-screen bg-white">
        <nav class="border-b p-4 sticky top-0 bg-white z-50">
            <div class="max-w-5xl mx-auto flex justify-between items-center gap-2">
                <button onclick="retourDashboard()" class="text-gray-400 font-bold">← Retour</button>
                <div class="flex gap-2">
                    <button id="btn-share-inline" onclick="copierLienDepuisEditeur()" class="hidden bg-emerald-50 text-emerald-700 px-4 py-2 rounded-xl font-bold text-sm">🔗 Partager</button>
                    <button onclick="sauvegarderListe()" class="bg-emerald-600 text-white px-6 py-2 rounded-xl font-bold shadow-md">Enregistrer</button>
                </div>
            </div>
        </nav>
        <main class="max-w-3xl mx-auto p-4 sm:p-6 space-y-6">
            <input type="hidden" id="edit-id">
            <div class="space-y-4">
                <input type="text" id="input-titre" placeholder="Titre de la collecte" class="input-responsive text-2xl font-bold w-full outline-none border-b focus:border-emerald-500 pb-2">
                
                <select id="input-type" class="w-full p-4 bg-emerald-50 rounded-2xl text-emerald-800 font-bold outline-none">
                    <option value="Sadaqa Jariya">Sadaqa Jariya</option>
                    <option value="Zakat Al Maal">Zakat Al Maal</option>
                    <option value="Sadaqa">Sadaqa</option>
                    <option value="Construction Mosquée">Construction Mosquée</option>
                    <option value="Puits & Eau">Puits & Eau</option>
                    <option value="Aide Alimentaire">Aide Alimentaire</option>
                    <option value="Orphelins">Orphelins</option>
                    <option value="Autre">Autre</option>
                </select>

                <textarea id="input-desc" placeholder="Message aux donateurs..." class="input-responsive w-full p-4 bg-gray-50 rounded-[2rem] outline-none" rows="4"></textarea>
            </div>
            <div class="space-y-4">
                <h3 class="font-bold text-lg text-gray-800">Actions de dons</h3>
                <div id="liste-actions" class="space-y-4"></div>
                <button onclick="ajouterLigne()" class="w-full py-4 border-2 border-dashed border-emerald-200 text-emerald-600 font-bold rounded-2xl hover:bg-emerald-50 transition-colors">
                    + Ajouter une action
                </button>
            </div>
        </main>
    </div>

    <div id="app-public" class="hidden bg-white min-h-screen">
        <nav id="nav-aperçu" class="hidden border-b p-4 sticky top-0 bg-emerald-600 text-white z-50">
             <div class="max-w-5xl mx-auto flex justify-between items-center px-4">
                <button onclick="retourDashboard()" class="font-bold text-sm">← Quitter</button>
                <span class="text-xs font-bold uppercase tracking-widest">Aperçu</span>
                <div class="w-8"></div>
            </div>
        </nav>
        <main class="max-w-5xl mx-auto p-4 sm:p-6 space-y-12 py-16">
            <div class="text-center space-y-4 animate-fade-in">
                <span id="pub-badge" class="px-4 py-1.5 rounded-full text-[10px] font-bold uppercase bg-emerald-100 text-emerald-800"></span>
                <h1 id="pub-titre" class="text-3xl sm:text-4xl font-extrabold text-gray-900 tracking-tight"></h1>
                <p id="pub-desc" class="max-w-2xl mx-auto text-gray-600"></p>
            </div>
            <div id="pub-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8"></div>
        </main>
    </div>

    <script>
        const SUPABASE_URL = "https://qrtfsakvzlkjqueurvci.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFydGZzYWt2emxranF1ZXVydmNpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MDM5MDksImV4cCI6MjA4ODI3OTkwOX0.muCLFvI4h8p8jmjOgrRNKuqkLlD2Xbx9jxZKsSjMB4g";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let currentUserId = null;
        let isRegisterMode = false;

        function togglePasswordVisibility() {
            const pwdInput = document.getElementById('login-password');
            const pwdIcon = document.getElementById('pwd-icon');
            if (pwdInput.type === 'password') {
                pwdInput.type = 'text';
                pwdIcon.innerText = '🙈';
            } else {
                pwdInput.type = 'password';
                pwdIcon.innerText = '👁️';
            }
        }

        function cacherToutesVues() {
            ['vue-login', 'app-dashboard', 'app-editor', 'app-public'].forEach(id => document.getElementById(id).classList.add('hidden'));
            document.getElementById('nav-aperçu').classList.add('hidden');
        }

        function retourDashboard() {
            cacherToutesVues();
            document.getElementById('app-dashboard').classList.remove('hidden');
            chargerMesListes();
        }

        async function chargerMesListes() {
            const { data } = await _supabase.from('listes_dons').select('*').eq('user_id', currentUserId).order('created_at', { ascending: false });
            const container = document.getElementById('container-listes');
            container.innerHTML = '';
            data.forEach(liste => {
                const div = document.createElement('div');
                div.className = "bg-white p-6 rounded-[2.5rem] shadow-sm border border-gray-100 animate-fade-in relative";
                div.innerHTML = `
                    <button onclick="supprimerListe('${liste.id}')" class="absolute top-6 right-6 text-red-400 hover:text-red-600 transition-colors">🗑️</button>
                    <div class="mb-6"><h3 class="font-bold text-xl mb-1 line-clamp-2 pr-10">${liste.titre || 'Sans titre'}</h3><p class="text-emerald-600 text-[10px] font-black uppercase">${liste.type_don}</p></div>
                    <div class="flex flex-col gap-2">
                        <button onclick='chargerVuePublique("${liste.id}", true)' class="w-full bg-blue-600 text-white py-3.5 rounded-2xl text-xs font-bold">👁️ Voir l'aperçu</button>
                        <div class="flex gap-2">
                            <button onclick='ouvrirEditeur(${JSON.stringify(liste).replace(/'/g, "&apos;")})' class="flex-1 bg-gray-100 py-3 rounded-2xl text-xs font-bold">⚙️ Modifier</button>
                            <button onclick='copierLien("${liste.id}")' class="flex-1 bg-emerald-50 text-emerald-700 py-3 rounded-2xl text-xs font-bold">🔗 Partager</button>
                        </div>
                    </div>`;
                container.appendChild(div);
            });
        }

        async function supprimerListe(id) {
            if(confirm("Supprimer cette liste ?")) {
                const { error } = await _supabase.from('listes_dons').delete().eq('id', id);
                if (error) alert(error.message); else chargerMesListes();
            }
        }

        function copierLien(id) {
            const url = `${window.location.origin}${window.location.pathname}?list=${id}`;
            navigator.clipboard.writeText(url).then(() => alert("Lien copié !"));
        }

        function copierLienDepuisEditeur() {
            const id = document.getElementById('edit-id').value;
            if (id) copierLien(id);
        }

        async function chargerVuePublique(id, estApercu = false) {
            const { data } = await _supabase.from('listes_dons').select('*').eq('id', id).single();
            if (!data) return;
            cacherToutesVues();
            document.getElementById('app-public').classList.remove('hidden');
            if(estApercu) document.getElementById('nav-aperçu').classList.remove('hidden');
            document.getElementById('pub-titre').innerText = data.titre;
            document.getElementById('pub-desc').innerText = data.description;
            document.getElementById('pub-badge').innerText = data.type_don;
            
            const grid = document.getElementById('pub-grid');
            grid.innerHTML = '';
            data.projets.forEach(p => {
                const cleanUrl = p.url.trim();
                let domain = "";
                try { domain = new URL(cleanUrl).hostname.replace('www.', ''); } catch(e) { domain = "Lien"; }
                const faviconUrl = `https://www.google.com/s2/favicons?domain=${cleanUrl}&sz=128`;

                grid.innerHTML += `
                    <div class="card-gradient p-5 rounded-[2.5rem] shadow-sm border border-emerald-50 flex flex-col animate-fade-in">
                        <div class="w-full h-44 bg-emerald-600 rounded-3xl mb-4 overflow-hidden relative flex items-center justify-center shadow-inner">
                            <div class="absolute inset-0 opacity-10 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')]"></div>
                            <div class="flex flex-col items-center gap-3 z-10">
                                <div class="w-16 h-16 bg-white rounded-2xl shadow-lg flex items-center justify-center p-3">
                                    <img src="${faviconUrl}" class="w-full h-full object-contain" alt="logo">
                                </div>
                                <span class="text-white font-bold text-xs uppercase tracking-widest bg-emerald-700/50 px-3 py-1 rounded-full">${domain}</span>
                            </div>
                        </div>
                        <a href="${cleanUrl}" target="_blank" class="w-full py-4 mb-4 bg-emerald-600 text-white rounded-2xl text-center font-bold shadow-md">Participer</a>
                        <h3 class="text-xl font-bold text-gray-800 line-clamp-2 h-[3rem] flex items-center">${p.nom}</h3>
                    </div>`;
            });
        }

        function ajouterLigne(nom = '', url = '') {
            const div = document.createElement('div');
            div.className = "action-item flex flex-col gap-2 p-4 bg-gray-50 rounded-[1.5rem] border border-dashed border-gray-300 relative animate-fade-in";
            div.innerHTML = `
                <button onclick="this.parentElement.remove()" class="absolute -top-2 -right-2 bg-white text-red-500 rounded-full p-1 border shadow-sm">✕</button>
                <input type="text" placeholder="Nom du projet" class="action-nom input-responsive w-full p-3 bg-white border rounded-xl outline-none" value="${nom}">
                <input type="text" placeholder="Lien URL (https://...)" class="action-url input-responsive w-full p-3 bg-white border rounded-xl outline-none" value="${url}">
            `;
            document.getElementById('liste-actions').appendChild(div);
        }

        function ouvrirEditeur(liste = null) {
            cacherToutesVues();
            document.getElementById('app-editor').classList.remove('hidden');
            document.getElementById('liste-actions').innerHTML = '';
            const shareBtn = document.getElementById('btn-share-inline');
            if (liste) {
                document.getElementById('edit-id').value = liste.id;
                document.getElementById('input-titre').value = liste.titre;
                document.getElementById('input-desc').value = liste.description;
                document.getElementById('input-type').value = liste.type_don;
                shareBtn.classList.remove('hidden');
                liste.projets.forEach(p => ajouterLigne(p.nom, p.url));
            } else {
                document.getElementById('edit-id').value = '';
                shareBtn.classList.add('hidden');
                ajouterLigne();
            }
        }

        async function sauvegarderListe() {
            const projects = [];
            document.querySelectorAll('.action-item').forEach(item => {
                const nom = item.querySelector('.action-nom').value;
                const url = item.querySelector('.action-url').value;
                if(nom && url) projects.push({ nom: nom.trim(), url: url.trim() });
            });
            const id = document.getElementById('edit-id').value;
            const payload = { user_id: currentUserId, titre: document.getElementById('input-titre').value, description: document.getElementById('input-desc').value, type_don: document.getElementById('input-type').value, projets: projects };
            const { data, error } = id ? 
                await _supabase.from('listes_dons').update(payload).eq('id', id).select() : 
                await _supabase.from('listes_dons').insert([payload]).select();
            
            if (error) alert(error.message); 
            else {
                if(data && data[0]) {
                    document.getElementById('edit-id').value = data[0].id;
                    document.getElementById('btn-share-inline').classList.remove('hidden');
                }
                alert("Enregistré avec succès !");
                retourDashboard();
            }
        }

        async function authAction() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            if (isRegisterMode) {
                const { data, error } = await _supabase.auth.signUp({ email, password });
                if (error) alert(error.message); else alert("Compte créé ! Vérifiez vos emails pour confirmer.");
            } else {
                const { data, error } = await _supabase.auth.signInWithPassword({ email, password });
                if (error) alert(error.message); else checkSession();
            }
        }

        async function handleForgotPassword() {
            const email = document.getElementById('login-email').value;
            if (!email) return alert("Saisissez votre email d'abord.");
            const { error } = await _supabase.auth.resetPasswordForEmail(email);
            if (error) alert(error.message); else alert("Lien envoyé par email !");
        }

        function toggleAuthMode() {
            isRegisterMode = !isRegisterMode;
            document.getElementById('register-fields').classList.toggle('hidden');
            document.getElementById('btn-main-auth').innerText = isRegisterMode ? "S'inscrire" : "Se connecter";
            document.getElementById('btn-switch-auth').innerText = isRegisterMode ? "Déjà un compte ? Connexion" : "Créer un compte";
        }

        async function checkSession() {
            const urlParams = new URLSearchParams(window.location.search);
            const listId = urlParams.get('list');
            if (listId) { chargerVuePublique(listId); } 
            else {
                const { data: { session } } = await _supabase.auth.getSession();
                if (session) { 
                    currentUserId = session.user.id; 
                    document.getElementById('user-welcome').innerText = session.user.email; 
                    retourDashboard(); 
                } else { 
                    cacherToutesVues(); 
                    document.getElementById('vue-login').classList.remove('hidden'); 
                }
            }
        }
        function handleLogout() { _supabase.auth.signOut().then(() => location.reload()); }
        window.onload = checkSession;
    </script>
</body>
</html>
