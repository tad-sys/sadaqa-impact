<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sadaqa Impact - Mes Collectes</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card-gradient { background: linear-gradient(135deg, #f0fdf4 0%, #ffffff 100%); }
        .animate-fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans text-gray-900">

    <section id="vue-login" class="min-h-screen flex items-center justify-center p-4">
        <div class="max-w-md w-full bg-white rounded-[2.5rem] shadow-xl p-10 animate-fade-in border border-emerald-50 text-center">
            <div class="text-4xl mb-4">🌙</div>
            <h1 class="text-3xl font-extrabold text-emerald-800 mb-2">Sadaqa Impact</h1>
            <p id="auth-title" class="text-gray-500 mb-8 font-medium">Gérez vos collectes de dons</p>
            
            <div class="space-y-4 text-left">
                <div id="register-fields" class="hidden grid grid-cols-2 gap-4">
                    <input type="text" id="reg-prenom" placeholder="Prénom" class="w-full p-4 border border-gray-200 rounded-2xl outline-none focus:ring-2 focus:ring-emerald-500">
                    <input type="text" id="reg-nom" placeholder="Nom" class="w-full p-4 border border-gray-200 rounded-2xl outline-none focus:ring-2 focus:ring-emerald-500">
                </div>

                <div id="standard-auth-fields" class="space-y-4">
                    <input type="email" id="login-email" placeholder="Email" class="w-full p-4 border border-gray-200 rounded-2xl outline-none focus:ring-2 focus:ring-emerald-500">
                    <div class="relative">
                        <input type="password" id="login-password" placeholder="Mot de passe" class="w-full p-4 border border-gray-200 rounded-2xl outline-none focus:ring-2 focus:ring-emerald-500">
                        <button onclick="handleForgotPassword()" class="absolute right-4 top-4 text-xs text-emerald-600 font-bold">Oublié ?</button>
                    </div>
                </div>

                <div id="reset-password-fields" class="hidden space-y-4">
                    <input type="password" id="new-password" placeholder="Nouveau mot de passe" class="w-full p-4 border border-emerald-200 rounded-2xl outline-none">
                    <button onclick="updatePassword()" class="w-full py-4 bg-emerald-600 text-white rounded-2xl font-bold">Mettre à jour</button>
                </div>

                <div id="auth-buttons" class="flex flex-col gap-3 mt-4">
                    <button id="btn-auth-primary" onclick="handleLogin()" class="w-full py-4 bg-emerald-600 text-white rounded-2xl font-bold shadow-lg">Se connecter</button>
                    <button id="btn-auth-secondary" onclick="toggleAuthMode()" class="w-full py-4 bg-white border-2 border-emerald-600 text-emerald-600 rounded-2xl font-bold">Créer un compte</button>
                </div>
            </div>
        </div>
    </section>

    <div id="app-dashboard" class="hidden">
        <nav class="bg-white border-b p-4 mb-8 sticky top-0 z-50">
            <div class="max-w-5xl mx-auto flex justify-between items-center">
                <h1 class="text-xl font-bold text-emerald-700">🌙 Sadaqa Impact</h1>
                <button onclick="handleLogout()" class="text-sm font-bold text-red-500 bg-red-50 px-4 py-2 rounded-xl">Déconnexion</button>
            </div>
        </nav>

        <main class="max-w-5xl mx-auto px-4">
            <div class="flex justify-between items-center mb-8">
                <div>
                    <h2 class="text-3xl font-black text-gray-800">Mes Listes</h2>
                    <p id="user-welcome" class="text-gray-500"></p>
                </div>
                <button onclick="ouvrirEditeur()" class="bg-emerald-600 text-white px-6 py-3 rounded-2xl font-bold shadow-lg hover:scale-105 transition-transform">
                    + Nouvelle liste
                </button>
            </div>

            <div id="container-listes" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                </div>
        </main>
    </div>

    <div id="app-editor" class="hidden min-h-screen bg-white">
        <nav class="border-b p-4 flex justify-between items-center max-w-5xl mx-auto">
            <button onclick="retourDashboard()" class="text-gray-500 font-bold">← Retour</button>
            <div class="flex gap-2">
                <button onclick="sauvegarderListe()" class="bg-emerald-600 text-white px-6 py-2 rounded-xl font-bold">Enregistrer</button>
            </div>
        </nav>

        <main class="max-w-3xl mx-auto p-6 space-y-8">
            <input type="hidden" id="edit-id">
            <div class="space-y-4">
                <input type="text" id="input-titre" placeholder="Titre de la collecte (ex: Puits au Mali)" class="text-3xl font-bold w-full outline-none border-b focus:border-emerald-500 pb-2">
                <select id="input-type" class="w-full p-3 bg-emerald-50 rounded-xl text-emerald-800 font-bold outline-none">
                    <option value="Sadaqa Jariya">Sadaqa Jariya</option>
                    <option value="Zakat Al Maal">Zakat Al Maal</option>
                    <option value="Sadaqa">Sadaqa</option>
                </select>
                <textarea id="input-desc" placeholder="Écrivez un message pour vos donateurs..." class="w-full p-4 bg-gray-50 rounded-2xl outline-none" rows="4"></textarea>
            </div>

            <div class="space-y-4">
                <h3 class="font-bold text-lg">Liens de dons</h3>
                <div id="liste-actions" class="space-y-3"></div>
                <button onclick="ajouterLigne()" class="text-emerald-600 font-bold">+ Ajouter un projet</button>
            </div>
        </main>
    </div>

    <div id="app-public" class="hidden">
        <main class="max-w-2xl mx-auto p-6 text-center space-y-8 py-20">
            <div id="public-content" class="animate-fade-in">
                <span id="pub-badge" class="bg-emerald-100 text-emerald-700 px-4 py-1 rounded-full text-xs font-bold uppercase"></span>
                <h1 id="pub-titre" class="text-4xl font-black mt-4 text-gray-900"></h1>
                <p id="pub-desc" class="text-lg text-gray-600 mt-4"></p>
                <div id="pub-grid" class="grid gap-6 mt-12"></div>
                <p id="pub-organisateur" class="mt-12 text-sm text-gray-400 italic"></p>
            </div>
        </main>
    </div>

    <script>
        const SUPABASE_URL = "https://qrtfsakvzlkjqueurvci.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFydGZzYWt2emxranF1ZXVydmNpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MDM5MDksImV4cCI6MjA4ODI3OTkwOX0.muCLFvI4h8p8jmjOgrRNKuqkLlD2Xbx9jxZKsSjMB4g";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUserId = null;

        // --- NAVIGATION ---
        function cacherToutesVues() {
            ['vue-login', 'app-dashboard', 'app-editor', 'app-public'].forEach(id => document.getElementById(id).classList.add('hidden'));
        }

        function retourDashboard() {
            cacherToutesVues();
            document.getElementById('app-dashboard').classList.remove('hidden');
            chargerMesListes();
        }

        function ouvrirEditeur(liste = null) {
            cacherToutesVues();
            document.getElementById('app-editor').classList.remove('hidden');
            document.getElementById('liste-actions').innerHTML = '';
            
            if (liste) {
                document.getElementById('edit-id').value = liste.id;
                document.getElementById('input-titre').value = liste.titre;
                document.getElementById('input-desc').value = liste.description;
                document.getElementById('input-type').value = liste.type_don;
                liste.projets.forEach(p => ajouterLigne(p.nom, p.url));
            } else {
                document.getElementById('edit-id').value = '';
                document.getElementById('input-titre').value = '';
                document.getElementById('input-desc').value = '';
                ajouterLigne();
            }
        }

        // --- AUTHENTIFICATION ---
        async function handleLogin() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const { data, error } = await _supabase.auth.signInWithPassword({ email, password });
            if (error) alert(error.message); else checkSession();
        }

        function handleLogout() { _supabase.auth.signOut().then(() => location.reload()); }

        function toggleAuthMode() {
            const isLogin = document.getElementById('register-fields').classList.contains('hidden');
            document.getElementById('register-fields').classList.toggle('hidden');
            document.getElementById('btn-auth-primary').innerText = isLogin ? "S'inscrire" : "Se connecter";
            document.getElementById('btn-auth-primary').onclick = isLogin ? handleSignup : handleLogin;
        }

        async function handleSignup() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const { error } = await _supabase.auth.signUp({ email, password, options: { data: { first_name: document.getElementById('reg-prenom').value } } });
            if (error) alert(error.message); else alert("Compte créé !");
        }

        // --- GESTION DES DONNÉES ---
        async function chargerMesListes() {
            const { data, error } = await _supabase.from('listes_dons').select('*').eq('user_id', currentUserId).order('created_at', { ascending: false });
            const container = document.getElementById('container-listes');
            container.innerHTML = '';
            
            data.forEach(liste => {
                const div = document.createElement('div');
                div.className = "bg-white p-6 rounded-3xl shadow-sm border border-gray-100 animate-fade-in";
                div.innerHTML = `
                    <h3 class="font-bold text-xl mb-1">${liste.titre}</h3>
                    <p class="text-emerald-600 text-xs font-bold uppercase mb-4">${liste.type_don}</p>
                    <div class="flex gap-2">
                        <button onclick='editerListe(${JSON.stringify(liste)})' class="flex-1 bg-gray-100 py-2 rounded-xl text-sm font-bold">Modifier</button>
                        <button onclick='copierLien("${liste.id}")' class="flex-1 bg-emerald-50 text-emerald-700 py-2 rounded-xl text-sm font-bold">Lien de partage</button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function editerListe(liste) { ouvrirEditeur(liste); }

        async function sauvegarderListe() {
            const projects = [];
            document.querySelectorAll('.action-item').forEach(item => {
                const nom = item.querySelector('.action-nom').value;
                const url = item.querySelector('.action-url').value;
                if(nom && url) projects.push({ nom, url });
            });

            const id = document.getElementById('edit-id').value;
            const payload = {
                user_id: currentUserId,
                titre: document.getElementById('input-titre').value || "Sans titre",
                description: document.getElementById('input-desc').value,
                type_don: document.getElementById('input-type').value,
                projets: projects,
                organisateur_nom: "Organisateur"
            };

            const { error } = id 
                ? await _supabase.from('listes_dons').update(payload).eq('id', id)
                : await _supabase.from('listes_dons').insert([payload]);

            if (error) alert(error.message); else retourDashboard();
        }

        function copierLien(id) {
            const url = `${window.location.origin}${window.location.pathname}?list=${id}`;
            navigator.clipboard.writeText(url);
            alert("Lien copié !");
        }

        // --- MODE PUBLIC ---
        async function chargerVuePublique(id) {
            const { data } = await _supabase.from('listes_dons').select('*').eq('id', id).single();
            if (!data) return;
            cacherToutesVues();
            document.getElementById('app-public').classList.remove('hidden');
            document.getElementById('pub-titre').innerText = data.titre;
            document.getElementById('pub-desc').innerText = data.description;
            document.getElementById('pub-badge').innerText = data.type_don;
            
            const grid = document.getElementById('pub-grid');
            data.projets.forEach(p => {
                grid.innerHTML += `
                    <div class="bg-white p-6 rounded-3xl shadow-md text-left">
                        <h4 class="font-bold text-xl mb-4">${p.nom}</h4>
                        <a href="${p.url}" target="_blank" class="block w-full py-4 bg-emerald-600 text-white rounded-2xl text-center font-bold">Faire un don</a>
                    </div>`;
            });
        }

        // --- INITIALISATION ---
        function ajouterLigne(nom = '', url = '') {
            const div = document.createElement('div');
            div.className = "action-item flex gap-2 animate-fade-in";
            div.innerHTML = `
                <input type="text" placeholder="Nom" class="action-nom flex-1 p-3 bg-gray-50 rounded-xl outline-none border focus:border-emerald-500" value="${nom}">
                <input type="text" placeholder="Lien URL" class="action-url flex-1 p-3 bg-gray-50 rounded-xl outline-none border focus:border-emerald-500" value="${url}">
            `;
            document.getElementById('liste-actions').appendChild(div);
        }

        async function checkSession() {
            const urlParams = new URLSearchParams(window.location.search);
            const listId = urlParams.get('list');
            
            if (listId) {
                chargerVuePublique(listId);
            } else {
                const { data: { session } } = await _supabase.auth.getSession();
                if (session) {
                    currentUserId = session.user.id;
                    document.getElementById('user-welcome').innerText = `Connecté en tant que ${session.user.email}`;
                    retourDashboard();
                } else {
                    cacherToutesVues();
                    document.getElementById('vue-login').classList.remove('hidden');
                }
            }
        }

        window.onload = checkSession;
    </script>
</body>
</html>
