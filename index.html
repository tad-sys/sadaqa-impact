<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sadaqa Impact - Mes Collectes</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card-gradient { background: linear-gradient(135deg, #f0fdf4 0%, #ffffff 100%); }
        .animate-fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans text-gray-900">

    <section id="vue-login" class="min-h-screen flex items-center justify-center p-4">
        <div class="max-w-md w-full bg-white rounded-[2.5rem] shadow-xl p-10 animate-fade-in border border-emerald-50 text-center">
            <div class="text-4xl mb-4">🌙</div>
            <h1 class="text-3xl font-extrabold text-emerald-800 mb-2">Sadaqa Impact</h1>
            <p id="auth-title" class="text-gray-500 mb-8 font-medium">Gérez vos collectes de dons</p>
            
            <div class="space-y-4 text-left">
                <div id="register-fields" class="hidden grid grid-cols-2 gap-4">
                    <input type="text" id="reg-prenom" placeholder="Prénom" class="w-full p-4 border border-gray-200 rounded-2xl outline-none focus:ring-2 focus:ring-emerald-500">
                    <input type="text" id="reg-nom" placeholder="Nom" class="w-full p-4 border border-gray-200 rounded-2xl outline-none focus:ring-2 focus:ring-emerald-500">
                </div>

                <div id="standard-auth-fields" class="space-y-4">
                    <input type="email" id="login-email" placeholder="Email" class="w-full p-4 border border-gray-200 rounded-2xl outline-none focus:ring-2 focus:ring-emerald-500">
                    <div class="relative">
                        <input type="password" id="login-password" placeholder="Mot de passe" class="w-full p-4 border border-gray-200 rounded-2xl outline-none focus:ring-2 focus:ring-emerald-500">
                        <button onclick="handleForgotPassword()" class="absolute right-4 top-4 text-xs text-emerald-600 font-bold">Oublié ?</button>
                    </div>
                </div>

                <div id="reset-password-fields" class="hidden space-y-4 border-t pt-4">
                    <p class="text-sm font-medium text-emerald-800">Nouveau mot de passe :</p>
                    <input type="password" id="new-password" placeholder="6 caractères min." class="w-full p-4 border border-emerald-200 rounded-2xl outline-none focus:ring-2 focus:ring-emerald-500">
                    <button onclick="updatePassword()" class="w-full py-4 bg-emerald-600 text-white rounded-2xl font-bold shadow-lg">Mettre à jour</button>
                </div>

                <div id="auth-buttons" class="flex flex-col gap-3 mt-4">
                    <button id="btn-auth-primary" onclick="handleLogin()" class="w-full py-4 bg-emerald-600 text-white rounded-2xl font-bold shadow-lg">Se connecter</button>
                    <button id="btn-auth-secondary" onclick="toggleAuthMode()" class="w-full py-4 bg-white border-2 border-emerald-600 text-emerald-600 rounded-2xl font-bold">Créer un compte</button>
                </div>
            </div>
        </div>
    </section>

    <div id="app-dashboard" class="hidden">
        <nav class="bg-white border-b p-4 mb-8 sticky top-0 z-50">
            <div class="max-w-5xl mx-auto flex justify-between items-center">
                <h1 class="text-xl font-bold text-emerald-700">🌙 Sadaqa Impact</h1>
                <button onclick="handleLogout()" class="text-sm font-bold text-red-500 bg-red-50 px-4 py-2 rounded-xl">Déconnexion</button>
            </div>
        </nav>

        <main class="max-w-5xl mx-auto px-4">
            <div class="flex justify-between items-center mb-8">
                <div>
                    <h2 class="text-3xl font-black text-gray-800">Mes Listes</h2>
                    <p id="user-welcome" class="text-gray-500"></p>
                </div>
                <button onclick="ouvrirEditeur()" class="bg-emerald-600 text-white px-6 py-3 rounded-2xl font-bold shadow-lg hover:scale-105 transition-transform">
                    + Nouvelle liste
                </button>
            </div>

            <div id="container-listes" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                </div>
        </main>
    </div>

    <div id="app-editor" class="hidden min-h-screen bg-white">
        <nav class="border-b p-4 sticky top-0 bg-white z-50">
            <div class="max-w-5xl mx-auto flex justify-between items-center">
                <button onclick="retourDashboard()" class="text-gray-500 font-bold">← Retour</button>
                <div class="flex gap-2">
                    <button onclick="sauvegarderListe()" class="bg-emerald-600 text-white px-6 py-2 rounded-xl font-bold shadow-md">Enregistrer la liste</button>
                </div>
            </div>
        </nav>

        <main class="max-w-3xl mx-auto p-6 space-y-8">
            <input type="hidden" id="edit-id">
            <div class="space-y-4">
                <input type="text" id="input-titre" placeholder="Titre de la collecte" class="text-3xl font-bold w-full outline-none border-b focus:border-emerald-500 pb-2">
                <select id="input-type" class="w-full p-3 bg-emerald-50 rounded-xl text-emerald-800 font-bold outline-none border-none">
                    <option value="Sadaqa Jariya">Sadaqa Jariya</option>
                    <option value="Zakat Al Maal">Zakat Al Maal</option>
                    <option value="Zakat Al Fitr">Zakat Al Fitr</option>
                    <option value="Sadaqa">Sadaqa</option>
                    <option value="Autre">Autre</option>
                </select>
                <textarea id="input-desc" placeholder="Message aux proches..." class="w-full p-4 bg-gray-50 rounded-2xl outline-none" rows="4"></textarea>
            </div>

            <div class="space-y-4">
                <h3 class="font-bold text-lg text-gray-800">Actions de dons</h3>
                <div id="liste-actions" class="space-y-4"></div>
                <button onclick="ajouterLigne()" class="text-emerald-600 font-bold hover:underline">+ Ajouter un projet</button>
            </div>
        </main>
    </div>

    <div id="app-public" class="hidden bg-white min-h-screen">
        <main class="max-w-5xl mx-auto p-6 space-y-12 py-16">
            <div class="text-center space-y-4">
                <span id="pub-badge" class="px-4 py-1.5 rounded-full text-xs font-bold uppercase tracking-widest bg-emerald-100 text-emerald-800 border border-emerald-200"></span>
                <h1 id="pub-titre" class="text-4xl font-extrabold text-gray-900 tracking-tight"></h1>
                <p id="pub-desc" class="max-w-2xl mx-auto text-lg text-gray-600 leading-relaxed"></p>
                <p id="pub-organisateur" class="text-sm text-gray-400 italic"></p>
            </div>
            
            <div id="pub-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
            
            <div id="back-to-editor" class="hidden text-center mt-20 pt-8 border-t">
                <button onclick="location.href=window.location.pathname" class="text-emerald-600 font-bold hover:underline">Créer ma propre liste Sadaqa Impact</button>
            </div>
        </main>
    </div>

    <script>
        const SUPABASE_URL = "https://qrtfsakvzlkjqueurvci.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFydGZzYWt2emxranF1ZXVydmNpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MDM5MDksImV4cCI6MjA4ODI3OTkwOX0.muCLFvI4h8p8jmjOgrRNKuqkLlD2Xbx9jxZKsSjMB4g";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUserId = null;

        // --- NAVIGATION ---
        function cacherToutesVues() {
            ['vue-login', 'app-dashboard', 'app-editor', 'app-public'].forEach(id => document.getElementById(id).classList.add('hidden'));
        }

        function retourDashboard() {
            cacherToutesVues();
            document.getElementById('app-dashboard').classList.remove('hidden');
            chargerMesListes();
        }

        function ouvrirEditeur(liste = null) {
            cacherToutesVues();
            document.getElementById('app-editor').classList.remove('hidden');
            document.getElementById('liste-actions').innerHTML = '';
            
            if (liste) {
                document.getElementById('edit-id').value = liste.id;
                document.getElementById('input-titre').value = liste.titre;
                document.getElementById('input-desc').value = liste.description;
                document.getElementById('input-type').value = liste.type_don;
                liste.projets.forEach(p => ajouterLigne(p.nom, p.url));
            } else {
                document.getElementById('edit-id').value = '';
                document.getElementById('input-titre').value = '';
                document.getElementById('input-desc').value = '';
                ajouterLigne();
            }
        }

        // --- AUTHENTIFICATION ---
        async function handleLogin() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const { data, error } = await _supabase.auth.signInWithPassword({ email, password });
            if (error) alert(error.message); else checkSession();
        }

        async function handleSignup() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const { error } = await _supabase.auth.signUp({ email, password, options: { data: { first_name: document.getElementById('reg-prenom').value } } });
            if (error) alert(error.message); else alert("Compte créé ! Vérifiez vos emails.");
        }

        function handleLogout() { _supabase.auth.signOut().then(() => location.reload()); }

        function toggleAuthMode() {
            const isLogin = document.getElementById('register-fields').classList.contains('hidden');
            document.getElementById('register-fields').classList.toggle('hidden');
            document.getElementById('btn-auth-primary').innerText = isLogin ? "S'inscrire" : "Se connecter";
            document.getElementById('btn-auth-primary').onclick = isLogin ? handleSignup : handleLogin;
        }

        async function handleForgotPassword() {
            const email = document.getElementById('login-email').value;
            if (!email) return alert("Saisissez votre email.");
            const { error } = await _supabase.auth.resetPasswordForEmail(email, { redirectTo: window.location.href });
            if (error) alert(error.message); else alert("Lien envoyé !");
        }

        async function updatePassword() {
            const newPassword = document.getElementById('new-password').value;
            const { error } = await _supabase.auth.updateUser({ password: newPassword });
            if (error) alert(error.message); else { alert("Réussi !"); window.location.hash = ""; location.reload(); }
        }

        // --- DONNÉES ---
        async function chargerMesListes() {
            const { data } = await _supabase.from('listes_dons').select('*').eq('user_id', currentUserId).order('created_at', { ascending: false });
            const container = document.getElementById('container-listes');
            container.innerHTML = '';
            
            data.forEach(liste => {
                const div = document.createElement('div');
                div.className = "bg-white p-6 rounded-[2rem] shadow-sm border border-gray-100 animate-fade-in flex flex-col justify-between";
                div.innerHTML = `
                    <div>
                        <h3 class="font-bold text-xl mb-1 line-clamp-2">${liste.titre || 'Sans titre'}</h3>
                        <p class="text-emerald-600 text-[10px] font-black uppercase tracking-widest mb-4">${liste.type_don}</p>
                    </div>
                    <div class="flex gap-2 mt-4">
                        <button onclick='ouvrirEditeur(${JSON.stringify(liste).replace(/'/g, "&apos;")})' class="flex-1 bg-gray-50 py-3 rounded-xl text-xs font-bold hover:bg-gray-100">Modifier</button>
                        <button onclick='copierLien("${liste.id}")' class="flex-1 bg-emerald-50 text-emerald-700 py-3 rounded-xl text-xs font-bold hover:bg-emerald-100">Partager</button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        async function sauvegarderListe() {
            const projects = [];
            document.querySelectorAll('.action-item').forEach(item => {
                const nom = item.querySelector('.action-nom').value;
                const url = item.querySelector('.action-url').value;
                if(nom && url) projects.push({ nom, url });
            });

            const id = document.getElementById('edit-id').value;
            const payload = {
                user_id: currentUserId,
                titre: document.getElementById('input-titre').value || "Ma Collecte",
                description: document.getElementById('input-desc').value,
                type_don: document.getElementById('input-type').value,
                projets: projects,
                organisateur_nom: "Organisateur"
            };

            const { error } = id 
                ? await _supabase.from('listes_dons').update(payload).eq('id', id)
                : await _supabase.from('listes_dons').insert([payload]);

            if (error) alert(error.message); else retourDashboard();
        }

        function copierLien(id) {
            const url = `${window.location.origin}${window.location.pathname}?list=${id}`;
            navigator.clipboard.writeText(url);
            alert("Lien de partage copié !");
        }

        // --- MODE PUBLIC (AVEC IMAGES) ---
        async function chargerVuePublique(id) {
            const { data } = await _supabase.from('listes_dons').select('*').eq('id', id).single();
            if (!data) return;
            cacherToutesVues();
            document.getElementById('app-public').classList.remove('hidden');
            document.getElementById('pub-titre').innerText = data.titre;
            document.getElementById('pub-desc').innerText = data.description;
            document.getElementById('pub-badge').innerText = data.type_don;
            document.getElementById('pub-organisateur').innerText = `Par ${data.organisateur_nom || 'un membre'}`;
            
            const grid = document.getElementById('pub-grid');
            grid.innerHTML = '';
            data.projets.forEach(p => {
                const screenshotUrl = `https://api.microlink.io/?url=${encodeURIComponent(p.url)}&screenshot=true&embed=screenshot.url`;
                grid.innerHTML += `
                    <div class="card-gradient p-6 rounded-[2.5rem] shadow-sm border border-emerald-50 flex flex-col animate-fade-in">
                        <div class="w-full h-44 bg-gray-100 rounded-2xl mb-4 overflow-hidden border">
                            <img src="${screenshotUrl}" class="w-full h-full object-cover" onerror="this.src='https://placehold.co/400x300?text=Sadaqa+Impact'">
                        </div>
                        <a href="${p.url}" target="_blank" class="w-full py-4 mb-4 bg-emerald-600 text-white rounded-2xl text-center font-bold shadow-md">Participer</a>
                        <h3 class="text-xl font-bold text-gray-800 leading-tight line-clamp-2 h-[3rem] flex items-center">${p.nom}</h3>
                        <p class="text-[10px] text-emerald-600 font-black uppercase tracking-tighter mt-1">${data.type_don}</p>
                    </div>`;
            });
            document.getElementById('back-to-editor').classList.remove('hidden');
        }

        // --- INITIALISATION ---
        function ajouterLigne(nom = '', url = '') {
            const div = document.createElement('div');
            div.className = "action-item flex flex-col gap-2 p-4 bg-gray-50 rounded-2xl border border-dashed border-gray-300 animate-fade-in";
            div.innerHTML = `
                <input type="text" placeholder="Nom du projet" class="action-nom w-full p-3 bg-white border rounded-xl outline-none focus:ring-2 focus:ring-emerald-500" value="${nom}">
                <input type="text" placeholder="Lien URL (ex: https://...)" class="action-url w-full p-3 bg-white border rounded-xl outline-none focus:ring-2 focus:ring-emerald-500" value="${url}">
            `;
            document.getElementById('liste-actions').appendChild(div);
        }

        async function checkSession() {
            const urlParams = new URLSearchParams(window.location.search);
            const listId = urlParams.get('list');
            
            if (listId) {
                chargerVuePublique(listId);
            } else if (window.location.hash.includes("type=recovery")) {
                cacherToutesVues();
                document.getElementById('vue-login').classList.remove('hidden');
                document.getElementById('standard-auth-fields').classList.add('hidden');
                document.getElementById('auth-buttons').classList.add('hidden');
                document.getElementById('reset-password-fields').classList.remove('hidden');
            } else {
                const { data: { session } } = await _supabase.auth.getSession();
                if (session) {
                    currentUserId = session.user.id;
                    document.getElementById('user-welcome').innerText = `${session.user.email}`;
                    retourDashboard();
                } else {
                    cacherToutesVues();
                    document.getElementById('vue-login').classList.remove('hidden');
                }
            }
        }

        window.onload = checkSession;
    </script>
</body>
</html>
